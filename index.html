<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AsusVisualDisplay | Premium Portal</title>
    
    <link rel="icon" type="image/png" href="asus_logo.png">
    
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>

    <div class="beams-container">
        <div class="beam"></div>
        <div class="beam"></div>
        <div class="grid-overlay"></div>
    </div>

    <header class="navbar-container">
        <div class="navbar-glass">
            <div class="logo">🚜 AsusVisualDisplay</div>
            
            <div class="nav-search-container" id="navSearchWrapper">
                <input type="text" id="modelSearch" placeholder="🔍 Buscar modelo...">
            </div>

            <nav class="nav-links">
                <a href="#" onclick="location.reload()">Inicio</a>
            </nav>
        </div>
    </header>

    <main class="hero-section">
        <div class="hero-content-wrapper">
            <p class="badge-msg">Portal de Contenidos</p>
            <h1 class="hero-title">In Search <br><span>of Incredible.</span></h1>

            <div class="hero-buttons">
                <button class="btn-outline" onclick="showSection('wallpapers')">Wallpapers</button>
                <button class="btn-outline" onclick="showSection('demos')">Demos</button>
                <button class="btn-outline" onclick="showSection('manuales')">Manuales</button>
            </div>
        </div>
    </main>

    <div class="gallery-container" id="gallery"></div>

    <footer>
        <p>© 2026 AsusVisualDisplay | Gestión de Activos Digitales | 🚜</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>

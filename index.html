<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AsusVisualDisplay | Portal de Recursos</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="navbar-container">
        <div class="navbar-glass">
            <div class="logo">🚜 AsusVisualDisplay</div>
            <nav class="nav-links">
                <a href="#" onclick="location.reload()">Inicio</a>
                <a href="https://drive.google.com" target="_blank">Drive</a>
            </nav>
        </div>
    </header>

    <main class="hero-section">
        <div class="badge">Contenido Visual</div>
        
        <h1 class="hero-title">Portal de contenido <br><span>visual</span></h1>

        <div class="hero-buttons">
            <button class="btn-main" onclick="showSection('wallpapers')">Wallpapers</button>
            <button class="btn-outline" onclick="showSection('demos')">Software Demos</button>
            <button class="btn-outline" onclick="showSection('manuales')">Manuales</button>
        </div>

        <div class="search-wrapper" id="searchContainer" style="display: none;">
            <input type="text" id="modelSearch" placeholder="🔍 Busca el contenido">
        </div>
    </main>

    <div class="gallery-container" id="gallery"></div>

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AsusVisualDisplay | Portal de Recursos</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <h1>AsusVisualDisplay</h1>
        <p>Gestión de Contenidos, Demos y Manuales</p>
    </header>

    <nav class="main-menu">
        <button onclick="showSection('wallpapers')">🖼️ Wallpapers</button>
        <button onclick="showSection('demos')">💾 Demos</button>
        <button onclick="showSection('manuales')">📚 Manuales</button>
        <a href="https://drive.google.com/tu-link-aqui" target="_blank" class="btn-drive">☁️ Google Drive</a>
    </nav>

    <section class="search-section" id="searchBar" style="display:none;">
        <input type="text" id="modelSearch" placeholder="🔍 Buscar en esta sección...">
    </section>

<main class="gallery-container" id="gallery">
    <div class="welcome-msg" style="animation: fadeInUp 1.5s ease-in-out;">
        <h2>AsusVisualDisplay</h2>
        <p>Tu centro de recursos está listo. Elige una categoría para empezar.</p>
    </div>
</main>

    <footer>
        <p>© 2026 AsusVisualDisplay | Proyecto Tractor 🚜</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
